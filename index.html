<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>It's Cin's Day!</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0a0a0a}

  .viewport{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  
  .stage{
    width:1920px;height:1080px;position:relative;
    background: linear-gradient(180deg, rgba(5,4,6,0.85), rgba(17,18,23,0.85)), url('assets/city.gif') center/cover;
    border:6px solid #111;color:#fff;font-family:'Press Start 2P',monospace;overflow:hidden
  }

  .hero{position:absolute;top:12%;width:100%;text-align:center;pointer-events:none;}
  .title{font-size:60px;line-height:1.1;pointer-events:auto;}
  
  .tagline{font-family:'Dancing Script',cursive;font-size:36px;margin-top:250px;opacity:0;transition:opacity 0.5s ease;letter-spacing: 2px;pointer-events:none;}
  .tagline.show{opacity:1;}

  .controls-wrap{
    position:absolute;
    left:50%;
    bottom:120px;            
    transform:translateX(-50%);
    width: auto;
    pointer-events: none;
    z-index: 999;
  }

  .controls{
    position:relative;       
    display:flex;
    align-items:center;
    gap:60px;
    pointer-events: auto;    
  }

  .btn{
    position:relative; 
    z-index: 999;      
    pointer-events: auto;
    display:inline-flex;
    width:240px;height:80px;border-radius:12px;
    align-items:center;justify-content:center;
    cursor:pointer;border:4px solid #222;background:#0f0f0f;font-size:20px;user-select:none;
    transition:transform .18s ease;
    will-change:transform;
  }

  @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.07)}100%{transform:scale(1)}}
  .animated{animation:pulse 1s infinite}

  @keyframes pulse-center {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.07); }
    100% { transform: translateX(-50%) scale(1); }
  }

  @keyframes desperate-bounce{
    0%, 100% {transform: scale(1.4) translateY(0);}
    50% {transform: scale(1.4) translateY(-15px);}
  }
  .desperate{
    animation: desperate-bounce 0.4s ease-in-out infinite !important;
    box-shadow: 0 0 30px rgba(29, 191, 122, 0.6);
    border-color: #2ed68d;
    z-index: 1000 !important; 
  }

  .yes{background:linear-gradient(180deg,#1dbf7a,#11985a);border-color:#1b8b5a}
  .no{background:linear-gradient(180deg,#bf3a4a,#9b1b24);border-color:#8b1b1b}

  .sprite{image-rendering:pixelated;width:48px;height:96px;display:inline-block;pointer-events:none;}

  .noteOverlay{position:absolute;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:2000;}
  
  .note{position:relative;width:720px;height:420px;background:#fff6d8;border:6px solid #b88e58;border-radius:12px;box-shadow:0 20px 40px rgba(0,0,0,0.6);display:flex;gap:18px;padding:20px;transform-origin:center;z-index:2005;pointer-events:auto;}
  @keyframes note-bounce{0%{transform:scale(0.92);opacity:0}60%{transform:scale(1.04);opacity:1}100%{transform:scale(1);opacity:1}}
  .note.bounce{animation:note-bounce .5s ease forwards}

  .text{flex:1;font-family:'Dancing Script',cursive;font-size:28px;color:#3b2f2f;white-space:pre-line}
  
  .media-col{display:flex;flex-direction:column;align-items:center;gap:16px;}
  
  .photo{width:250px;height:250px;border:4px dashed #b88e58;background:#fff;display:flex;align-items:center;justify-content:center}
  .photo img{width:100%;height:100%;object-fit:cover}

  .boba-gif{width:120px;height:auto;image-rendering:pixelated;}
  .dog-gif{position:absolute;bottom:-15px;left:40px;width:120px;image-rendering:pixelated;z-index:2;pointer-events:none;}

  .peonyScene{position:absolute;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none;z-index:50;}
  .peonyScene img{max-width:500px;filter:drop-shadow(0 10px 30px rgba(0,0,0,0.45))}

  .sparkles{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:60;}
  .spark{position:absolute;width:6px;height:6px;background:#fff;border-radius:1px;filter:drop-shadow(0 0 6px rgba(255,255,255,0.9));opacity:0}
  @keyframes sparkle-move{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(.2);opacity:0}}

  .petals{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:70;}
  .petal{position:absolute;width:18px;height:10px;background:#f6c6d6;border-radius:50%;opacity:0.95;transform-origin:center}
  @keyframes fall{0%{transform:translateY(-40px) rotate(0deg);opacity:1}100%{transform:translateY(640px) rotate(360deg);opacity:0}}

  .lyric-container {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2001; 
    overflow: hidden;
  }

  .lyric-pop {
    position: absolute;
    font-family: 'Dancing Script', cursive;
    font-size: 52px;
    color: #f6c6d6;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
    opacity: 0; 
    transform: scale(0.8) rotate(-5deg);
    transition: opacity 0.5s ease, transform 0.5s ease;
    max-width: 400px; 
    white-space: normal; 
  }

  .lyric-pop.show {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }

  #roadmapBtn {
    display: none;
    opacity: 0;
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%); 
    z-index: 2110;
    background: #1dbf7a;
    border: 4px solid #fff;
    color: #fff;
    padding: 15px 30px;
    border-radius: 50px;
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    cursor: pointer;
    transition: opacity 1s ease;
    pointer-events: auto;
  }
  #roadmapBtn.visible {
    opacity: 1;
    animation: pulse-center 1s infinite; 
  }

</style>
</head>
<body>
  <div class="viewport">
    <div class="stage" id="stage">

      <div class="hero">
        <div class="title">Will you join me at the legendary 56th?</div>
        <div class="tagline" id="tagline">No, No, Please Stop!</div>
      </div>

      <div class="peonyScene" id="peonyScene">
        <img src="assets/peony.gif" id="peonyGif" alt="peony">
      </div>
      <div class="sparkles" id="sparkles"></div>
      <div class="petals" id="petals"></div>

      <div class="controls-wrap" id="controlsWrap">
        <div class="controls" id="controls">
          <img src="assets/sprite1.gif" class="sprite" alt="sprite1">
          <div class="btn yes animated" id="yesBtn" role="button" tabindex="0">YES</div>
          <div class="btn no animated" id="noBtn" role="button" tabindex="0">NO</div>
          <img src="assets/sprite2.gif" class="sprite" alt="sprite2">
        </div>
      </div>

      <div class="noteOverlay" id="noteOverlay">
        <div class="lyric-container" id="lyricContainer"></div>
        
        <div class="note" id="noteBox">
          <div class="text">
        Dear Ocin, I like your decision.

        Plan confirmed:
        – 56
        – questionable billiards skills
        - and maybe the start of our legendary “happy family” plan HAHAHA,

        I’ll take care of the rest.
          </div>

          <div class="media-col">
            <div class="photo">
              <img src="assets/photo.jpg" alt="photo">
            </div>
            <img src="assets/boba.gif" alt="bubble tea" class="boba-gif">
          </div>
          
          <img src="assets/dog.gif" alt="dog" class="dog-gif">
        </div>

        <div id="roadmapBtn">SHOW ROADMAP</div>
      </div>

      <audio id="noteMusic" src="assets/music.mp3" preload="auto"></audio>

    </div>
  </div>

<script>
window.addEventListener('DOMContentLoaded', ()=>{

  function fitStage(){
    const viewportW = window.innerWidth;
    const viewportH = window.innerHeight;
    const stage = document.getElementById('stage');
    const scale = Math.min(viewportW/1920, viewportH/1080);
    stage.style.transform = 'scale(' + scale + ')';
    stage.style.transformOrigin = 'center';
  }
  window.addEventListener('resize', fitStage);
  fitStage();

  const stage = document.getElementById('stage');
  const yesBtn = document.getElementById('yesBtn');
  const noBtn  = document.getElementById('noBtn');
  const tagline = document.getElementById('tagline'); 
  const peonyScene = document.getElementById('peonyScene');
  const noteOverlay = document.getElementById('noteOverlay');
  const noteBox = document.getElementById('noteBox');
  const sparkles = document.getElementById('sparkles');
  const petals = document.getElementById('petals');
  const noteMusic = document.getElementById('noteMusic'); 
  const lyricContainer = document.getElementById('lyricContainer'); 
  const roadmapBtn = document.getElementById('roadmapBtn');

  let attempt = 0;
  let zigIndex = 0;

  const zigzagPattern = [
    { x: -600, y: -400 }, 
    { x: -600, y: 100 },  
    { x: 600,  y: -400 }, 
    { x: 600,  y: 100 },  
    { x: 0,    y: 0 }     
  ];

  noBtn.addEventListener('click', (ev) => {
    ev.preventDefault();
    ev.stopPropagation();
    
    noBtn.classList.remove('animated'); 
    
    if (attempt < 4) attempt++;

    if (attempt === 1) {
      noBtn.style.transform = `translate(-180px, 0px) scale(1)`;
    } 
    else if (attempt === 2) {
      noBtn.style.transform = `translate(500px, -300px) scale(1)`;
    } 
    else if (attempt === 3) {
      noBtn.style.transform = `translate(300px, -150px) scale(0.5)`;
      noBtn.innerText = "NO"; 
    }
  });

  noBtn.addEventListener('mouseenter', () => {
    if (attempt >= 3) {
      attempt = 4; 
      
      yesBtn.classList.remove('animated');
      yesBtn.classList.add('desperate');
      tagline.classList.add('show');
      
      const pos = zigzagPattern[zigIndex];
      noBtn.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(0.5)`;
      
      zigIndex++;
      if (zigIndex >= zigzagPattern.length) {
        zigIndex = 0; 
      }
    }
  });

  yesBtn.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') yesBtn.click(); });
  noBtn.addEventListener('keydown', (e)=>{ 
    if(e.key === 'Enter' && attempt < 4) noBtn.click(); 
    else if (e.key === 'Enter' && attempt >= 4) {
        noBtn.dispatchEvent(new Event('mouseenter')); 
    }
  });

  function playSparkles(){
    const stageRect = stage.getBoundingClientRect();
    const yesRect = yesBtn.getBoundingClientRect();
    const baseLeft = yesRect.left + yesRect.width/2 - stageRect.left;
    const baseTop  = yesRect.top  + yesRect.height/2 - stageRect.top;

    for(let i=0;i<15;i++){
      const s = document.createElement('div');
      s.className = 'spark';
      s.style.left = (baseLeft + (Math.random()*40-20)) + 'px';
      s.style.top  = (baseTop  + (Math.random()*20-10)) + 'px';
      const dx = (Math.random()*300-150) + 'px';
      const dy = (Math.random()*-200-50) + 'px';
      s.style.setProperty('--dx', dx);
      s.style.setProperty('--dy', dy);
      s.style.animation = `sparkle-move ${0.8 + Math.random()*0.6}s ease forwards`;
      sparkles.appendChild(s);
      setTimeout(()=> s.remove(), 1400);
    }
  }

  function playPetals(){
    const stageW = stage.clientWidth;
    for(let i=0;i<12;i++){
      const p = document.createElement('div');
      p.className = 'petal';
      const startX = (stageW/2) + (Math.random()*400 - 200);
      p.style.left = startX + 'px';
      p.style.top = '-40px';
      const dur = 1.4 + Math.random()*1.5;
      p.style.animation = `fall ${dur}s linear forwards`;
      p.style.transform = `rotate(${Math.random()*360}deg)`;
      petals.appendChild(p);
      setTimeout(()=> p.remove(), (dur + 0.3) * 1000);
    }
  }

  function playLyricSequence() {
    const lyrics = [
      { text: "Constellations of stars", duration: 2000 },
      { text: "Murals on city walls", duration: 2000 },
      { text: "I don't see nobody but you", duration: 4000 },
      { text: "You're my vice, you're my muse", duration: 2000 },
      { text: "You're a nineteenth floor view", duration: 2000 },
      { text: "I don't see nobody but you", duration: 4000 } 
    ];

    let currentLyric = 0;

    function showNextLyric() {
      if (currentLyric >= lyrics.length) return; 

      const lyricData = lyrics[currentLyric];
      const el = document.createElement('div');
      el.className = 'lyric-pop';
      el.innerText = lyricData.text;

      const isLeftSide = Math.random() > 0.5;
      if (isLeftSide) {
        const xPos = Math.floor(Math.random() * 100) + 50; 
        el.style.left = xPos + "px";
        el.style.textAlign = "left";
      } else {
        const xPos = Math.floor(Math.random() * 50) + 1370; 
        el.style.left = xPos + "px";
        el.style.textAlign = "left";
      }

      const yPos = Math.floor(Math.random() * 700) + 150;
      el.style.top = yPos + "px";

      lyricContainer.appendChild(el);

      el.style.opacity = "0";
      el.style.transform = `scale(0.8) rotate(${Math.random() * 20 - 10}deg)`;

      setTimeout(() => {
        el.style.opacity = "1";
        el.style.transform = `scale(1) rotate(0deg)`;
        el.classList.add('show');
      }, 50);

      setTimeout(() => {
        el.style.opacity = "0";
        setTimeout(() => el.remove(), 500); 
        currentLyric++;
        showNextLyric();
      }, lyricData.duration);
    }

    showNextLyric();
  }

  yesBtn.addEventListener('click', (ev)=>{
    ev.preventDefault();
    ev.stopPropagation(); 
    playSparkles();
    peonyScene.style.display = 'flex';
    playPetals();

    setTimeout(()=>{
      peonyScene.style.display = 'none';
      noteOverlay.style.display = 'flex';
      noteBox.classList.remove('bounce');
      void noteBox.offsetWidth; 
      noteBox.classList.add('bounce');
      
      noteMusic.play().catch(e => console.log("Audio play prevented by browser:", e));
      
      playLyricSequence();

      setTimeout(() => {
        roadmapBtn.style.display = 'block';
        setTimeout(() => {
          roadmapBtn.classList.add('visible');
        }, 50); 
      }, 4000);

    }, 1600);
  });

  roadmapBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    window.location.href = "roadmap.html";
  });

});
</script>
</body>
</html>
